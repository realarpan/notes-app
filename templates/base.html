<!DOCTYPE html>
<html>
<head>
    <title>Sunday School Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 py-4 bg-white/5 backdrop-blur-lg border-b border-white/10">
    <h1 class="text-xl font-semibold tracking-tight">Sunday School Notes</h1>

    {% if current_user.is_authenticated %}
    <a href="/logout" class="px-4 py-2 bg-red-500 hover:bg-red-600 rounded-lg text-sm">
        Logout
    </a>
    {% endif %}
</nav>

<!-- CONTENT -->
<div class="flex-grow p-6 max-w-5xl mx-auto w-full">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mb-4 p-3 bg-blue-500/20 border border-blue-400/30 rounded-lg">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

<!-- FOOTER -->
<footer class="text-center py-6 text-gray-400 text-sm">
    Made with ❤️ by <span class="text-white font-semibold">Arpan</span>
</footer>

</body>
</html>
