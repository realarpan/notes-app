{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center mt-20">
    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-80">

        <h2 class="text-2xl font-semibold mb-6 text-center">Welcome Back</h2>

        <form method="POST">
            <input name="username" placeholder="Username"
                class="w-full mb-4 p-3 rounded-lg bg-gray-800 text-white focus:outline-none">

            <input type="password" name="password" placeholder="Password"
                class="w-full mb-4 p-3 rounded-lg bg-gray-800 text-white focus:outline-none">

            <button class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg">
                Login
            </button>
        </form>

    </div>
</div>

{% endblock %}
