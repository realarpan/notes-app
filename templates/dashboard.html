{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl font-bold mb-6">Select Your Class</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-6">

{% for i in range(1,12) %}
<a href="/class/{{i}}" 
   class="bg-white/5 p-6 rounded-2xl text-center hover:scale-105 transition hover:bg-white/10">
    <h3 class="text-lg font-semibold">Class {{i}}</h3>
</a>
{% endfor %}

</div>

{% endblock %}
