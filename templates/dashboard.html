{% extends "base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto mt-10 px-4">

<!-- Header -->

<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-10">

<div>
    <h1 class="text-3xl font-semibold tracking-tight">
        Welcome 👋
    </h1>
    <p class="text-gray-400 text-sm mt-1">
        Select your class to access notes
    </p>
</div>

<!-- 🔍 Search + 🎤 Voice -->
<div class="flex gap-2 w-full md:w-64">
    <input 
        id="searchInput"
        type="text" 
        placeholder="Search classes..."
        class="px-4 py-2 rounded-lg bg-gray-800/80 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"
    >

    <button onclick="startVoice()" 
        id="voiceBtn"
        class="px-3 bg-gray-700 rounded-lg hover:bg-gray-600">
        Voice Search
    </button>
</div>

</div>

<!-- Class Grid -->

<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">

{% for i in range(1,12) %}
<a href="/class/{{i}}" 
   class="class-card group bg-white/5 backdrop-blur-lg p-6 rounded-2xl text-center border border-white/10 hover:border-blue-500/40 hover:bg-white/10 hover:scale-[1.04] transition-all duration-200 shadow-lg"
   data-name="class {{i}}">

    <div class="text-2xl font-bold mb-3 bg-blue-600/20 text-blue-400 w-12 h-12 flex items-center justify-center rounded-xl mx-auto group-hover:scale-110 transition">
        {{ i }}
    </div>
    
    <h3 class="text-lg font-semibold">
        Class {{i}}
    </h3>

    <p class="text-xs text-gray-400 mt-1">
        Notes
    </p>

</a>
{% endfor %}

</div>

<!-- No Results -->

<div id="noResults" class="hidden text-center mt-10 text-gray-400">
    No classes found
</div>

</div>

<!-- 🔥 SCRIPT -->

<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".class-card");
const noResults = document.getElementById("noResults");
const voiceBtn = document.getElementById("voiceBtn");

// 🔍 SEARCH
function applySearch(){
    const value = searchInput.value.toLowerCase();
    let visible = 0;

    cards.forEach(card => {
        const name = card.getAttribute("data-name");

        if (name.includes(value)) {
            card.style.display = "block";
            visible++;
        } else {
            card.style.display = "none";
        }
    });

    noResults.classList.toggle("hidden", visible !== 0);
}

searchInput.addEventListener("input", applySearch);

// 🎤 VOICE SEARCH
function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice search not supported in your browser");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    // UI feedback
    voiceBtn.innerText = "🎙️";
    searchInput.placeholder = "Listening...";

    recognition.onresult = function(event){
        let text = event.results[0][0].transcript.toLowerCase();
        searchInput.value = text;
        applySearch();
    };

    recognition.onend = function(){
        voiceBtn.innerText = "🎤";
        searchInput.placeholder = "Search classes...";
    };

    recognition.onerror = function(){
        alert("Voice error. Try again.");
        voiceBtn.innerText = "🎤";
        searchInput.placeholder = "Search classes...";
    };

    recognition.start();
}
</script>

{% endblock %}
