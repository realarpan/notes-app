<script>
const input = document.getElementById("searchNotes");
const notes = document.querySelectorAll(".note-card");
const noResults = document.getElementById("noResults");

let activeFilter = "all";

// word → number
const map = {
 "one":1,"two":2,"three":3,"four":4,"five":5,
 "six":6,"seven":7,"eight":8,"nine":9,"ten":10,
 "eleven":11,"twelve":12,"thirteen":13,"fourteen":14,
 "fifteen":15,"sixteen":16,"seventeen":17,"eighteen":18,
 "nineteen":19,"twenty":20
};

// 🔥 typo tolerance (ONLY for text, not numbers)
function fuzzyMatch(text, query){
    if(text.includes(query)) return true;

    let words = text.split(" ");
    return words.some(word=>{
        let dist = levenshtein(word, query);
        return dist <= 2;
    });
}

function levenshtein(a, b){
    const matrix = Array.from({length: b.length + 1}, () => []);
    for(let i=0;i<=b.length;i++) matrix[i][0] = i;
    for(let j=0;j<=a.length;j++) matrix[0][j] = j;

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            if(b[i-1] === a[j-1]){
                matrix[i][j] = matrix[i-1][j-1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i-1][j-1] + 1,
                    matrix[i][j-1] + 1,
                    matrix[i-1][j] + 1
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

function applySearch(){
    let value = input.value.toLowerCase().trim();
    let words = value.split(/\s+/);
    let visible = 0;

    notes.forEach(note=>{
        let title = note.getAttribute("data-title");
        let titleEl = note.querySelector(".title");

        // reset title
        titleEl.innerHTML = title;

        let show = true;
        let matchedNumber = null;

        let match = title.match(/(\d+)\s*-\s*(\d+)/);
        let start = match ? parseInt(match[1]) : null;
        let end = match ? parseInt(match[2]) : null;

        words.forEach(word=>{
            let matched = false;

            // ✅ NUMBER FIRST (FIX)
            let num = !isNaN(word) ? parseInt(word) : map[word];

            if(num && start !== null){
                if(num >= start && num <= end){
                    matched = true;
                    matchedNumber = num;
                }
            }

            // ✅ TEXT MATCH ONLY IF NOT NUMBER
            if(!num && fuzzyMatch(title, word)){
                matched = true;
            }

            if(!matched) show = false;
        });

        // ✅ FILTER FIX
        if(activeFilter !== "all" && start !== null){
            if(activeFilter === "first" && !(start >= 1 && start <= 7)) show = false;
            if(activeFilter === "second" && !(start >= 8 && start <= 14)) show = false;
            if(activeFilter === "third" && !(start >= 15 && start <= 20)) show = false;
        }

        if(show){
            note.style.display = "flex";
            visible++;

            // ✅ CLEAN HIGHLIGHT (ONLY NUMBER)
            if(matchedNumber){
                titleEl.innerHTML = title.replace(
                    new RegExp(`(${matchedNumber})`, "g"),
                    `<span style="color:#60a5fa;font-weight:700;">$1</span>`
                );
            }

        } else {
            note.style.display = "none";
        }
    });

    noResults.classList.toggle("hidden", visible !== 0);
}

input.addEventListener("input", applySearch);

// 🔘 filters
function setFilter(type){
    activeFilter = type;

    document.querySelectorAll(".filter-btn").forEach(btn=>{
        btn.classList.remove("bg-blue-600");
        btn.classList.add("bg-gray-700");
    });

    event.target.classList.add("bg-blue-600");

    applySearch();
}

// 🎤 voice search
function startVoice(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = function(event){
        input.value = event.results[0][0].transcript.toLowerCase();
        applySearch();
    };

    recognition.onerror = function(){
        alert("Voice search not supported");
    };

    recognition.start();
}
</script>
