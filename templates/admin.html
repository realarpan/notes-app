{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl font-bold mb-6">Admin Panel</h2>

<div class="bg-white/5 p-6 rounded-2xl max-w-md">

<form method="POST" enctype="multipart/form-data">

<select name="class_number"
    class="w-full mb-4 p-3 rounded-lg bg-gray-800 text-white">
    
{% for i in range(1,12) %}
<option value="{{i}}">Class {{i}}</option>
{% endfor %}

</select>

<input type="file" name="file"
    class="w-full mb-4 text-sm text-gray-300">

<button class="w-full bg-green-600 hover:bg-green-700 py-2 rounded-lg">
    Upload PDF
</button>

</form>

</div>

{% endblock %}
